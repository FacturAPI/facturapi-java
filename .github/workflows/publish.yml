name: Publish Java SDK

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    env:
      CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
      CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Check release gate
        id: gate
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import sys
          import urllib.request
          import xml.etree.ElementTree as ET

          ns = {"m": "http://maven.apache.org/POM/4.0.0"}
          pom = ET.parse("pom.xml").getroot()
          version = pom.findtext("m:version", namespaces=ns)
          if version is None:
              print("publish=false")
              print("reason=missing version")
              sys.exit(0)

          if version.endswith("-SNAPSHOT"):
              print("publish=false")
              print(f"current_version={version}")
              print("reason=snapshot version")
              sys.exit(0)

          metadata_url = "https://repo.maven.apache.org/maven2/io/facturapi/facturapi-java/maven-metadata.xml"
          latest = "0.0.0"
          try:
              with urllib.request.urlopen(metadata_url, timeout=20) as response:
                  metadata = ET.fromstring(response.read())
              latest = metadata.findtext("./versioning/release") or metadata.findtext("./versioning/latest") or latest
          except Exception:
              latest = "0.0.0"

          def parse_semver(value: str):
              core = value.split("+", 1)[0]
              main, _, prerelease = core.partition("-")
              major, minor, patch = (int(part) for part in main.split(".")[:3])
              return major, minor, patch, prerelease

          def is_greater(left: str, right: str) -> bool:
              left_parts = parse_semver(left)
              right_parts = parse_semver(right)
              if left_parts[:3] != right_parts[:3]:
                  return left_parts[:3] > right_parts[:3]
              left_pre = left_parts[3]
              right_pre = right_parts[3]
              if left_pre == right_pre:
                  return False
              if not left_pre:
                  return True
              if not right_pre:
                  return False
              return left_pre > right_pre

          publish = is_greater(version, latest)
          print(f"current_version={version}")
          print(f"latest_version={latest}")
          print(f"publish={'true' if publish else 'false'}")
          print(f"reason={'current version is newer than published version' if publish else 'published version is current or newer'}")
          PY

      - name: Publish
        if: steps.gate.outputs.publish == 'true'
        run: mvn -B -ntp -DskipTests -DpublishRelease=true deploy

      - name: Notify Slack (success)
        if: steps.gate.outputs.publish == 'true' && success()
        env:
          SLACK_DEPLOY_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
          VERSION: ${{ steps.gate.outputs.current_version }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SLACK_DEPLOY_WEBHOOK_URL:-}" ]; then
            echo "SLACK_DEPLOY_WEBHOOK_URL not set; skipping Slack notification"
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          ref_name = os.environ["GITHUB_REF_NAME"]
          sha = os.environ["GITHUB_SHA"]
          actor = os.environ["GITHUB_ACTOR"]
          server_url = os.environ["GITHUB_SERVER_URL"]
          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]

          changelog = Path("CHANGELOG.md")
          latest_changes = "See CHANGELOG for details."
          if changelog.exists():
              lines = changelog.read_text(encoding="utf-8").splitlines()
              in_latest = False
              bullets = []
              for line in lines:
                  if line.startswith("## [") and not in_latest:
                      in_latest = True
                      continue
                  if in_latest and line.startswith("## ["):
                      break
                  if in_latest and line.startswith("- "):
                      bullets.append(line[2:].strip())
              if bullets:
                  latest_changes = "\n".join(f"• {b}" for b in bullets[:5])

          payload = {
              "text": f"🚀 Facturapi Java SDK {version} published",
              "blocks": [
                  {
                      "type": "header",
                      "text": {
                          "type": "plain_text",
                          "text": f"🚀 Java SDK {version} is live on Maven Central"
                      }
                  },
                  {
                      "type": "section",
                      "fields": [
                          {"type": "mrkdwn", "text": f"*Package:* `io.facturapi:facturapi-java:{version}`"},
                          {"type": "mrkdwn", "text": f"*Branch:* `{ref_name}`"},
                          {"type": "mrkdwn", "text": f"*Commit:* `{sha}`"},
                          {"type": "mrkdwn", "text": f"*Actor:* `{actor}`"}
                      ]
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              "*Useful links*\n"
                              f"• Maven Central: <https://central.sonatype.com/artifact/io.facturapi/facturapi-java/{version}|View artifact>\n"
                              f"• Workflow run: <{server_url}/{repo}/actions/runs/{run_id}|Open run>\n"
                              f"• Changelog: <{server_url}/{repo}/blob/main/CHANGELOG.md|Read changes>"
                          )
                      }
                  },
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": f"*Latest changes*\n{latest_changes}"
                      }
                  }
              ]
          }

          Path("/tmp/slack_payload.json").write_text(json.dumps(payload), encoding="utf-8")
          PY

          curl -sS -X POST -H "Content-type: application/json" --data "@/tmp/slack_payload.json" "$SLACK_DEPLOY_WEBHOOK_URL"

      - name: Notify Slack (failure)
        if: steps.gate.outputs.publish == 'true' && failure()
        env:
          SLACK_DEPLOY_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
          VERSION: ${{ steps.gate.outputs.current_version }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SLACK_DEPLOY_WEBHOOK_URL:-}" ]; then
            echo "SLACK_DEPLOY_WEBHOOK_URL not set; skipping Slack notification"
            exit 0
          fi
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          version = os.environ["VERSION"]
          server_url = os.environ["GITHUB_SERVER_URL"]
          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          sha = os.environ["GITHUB_SHA"]

          payload = {
              "text": f"❌ Facturapi Java SDK {version} publish failed",
              "blocks": [
                  {
                      "type": "section",
                      "text": {
                          "type": "mrkdwn",
                          "text": (
                              f"❌ *Java SDK {version} publish failed*\n"
                              f"• Workflow run: <{server_url}/{repo}/actions/runs/{run_id}|Open run>\n"
                              f"• Commit: `{sha}`"
                          )
                      }
                  }
              ]
          }

          Path("/tmp/slack_payload_failure.json").write_text(json.dumps(payload), encoding="utf-8")
          PY
          curl -sS -X POST -H "Content-type: application/json" --data "@/tmp/slack_payload_failure.json" "$SLACK_DEPLOY_WEBHOOK_URL"

      - name: Skip publish
        if: steps.gate.outputs.publish != 'true'
        run: |
          echo "Skipping publish: ${{ steps.gate.outputs.reason }} (${{ steps.gate.outputs.current_version }} vs ${{ steps.gate.outputs.latest_version }})"
